<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tjoean - Game Edukasi Investasi</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="css/app.css" rel="stylesheet" />
    <style>
        :root {
            --an-forest: #1B4D3E;
            --an-forest-deep: #0F2E25;
            --an-gold: #C5A059;
            --an-cream: #F5F5DC;
            --an-copper: #B87333;
            --an-auburn: #CD853F;
            --an-rafflesia: #8B0000;
            --an-firefly: #FFD700;
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1B4D3E 0%, #0F2E25 60%, #091A14 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            padding: 2rem;
            gap: 0;
        }

        /* Banknote paper texture overlay */
        .loading-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(2deg, transparent, transparent 1px, rgba(245,245,220,0.012) 1px, rgba(245,245,220,0.012) 2px),
                repeating-linear-gradient(88deg, transparent, transparent 2px, rgba(197,160,89,0.008) 2px, rgba(197,160,89,0.008) 3px),
                repeating-linear-gradient(-35deg, transparent, transparent 18px, rgba(184,115,51,0.025) 18px, rgba(184,115,51,0.025) 19px),
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(197,160,89,0.015) 40px, rgba(197,160,89,0.015) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(197,160,89,0.015) 40px, rgba(197,160,89,0.015) 41px),
                radial-gradient(circle at 30% 40%, rgba(197,160,89,0.03) 0%, transparent 25%),
                radial-gradient(circle at 70% 60%, rgba(184,115,51,0.025) 0%, transparent 20%);
            pointer-events: none;
            z-index: 1;
        }

        /* Vignette */
        .loading-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(9,26,20,0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* ===== 3D COIN ===== */
        .coin-scene {
            perspective: 800px;
            width: 200px;
            height: 200px;
            position: relative;
            z-index: 2;
            margin-bottom: 2rem;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: coin-spin 3s ease-in-out infinite;
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 50%;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(197,160,89,0.3),
                inset 0 0 20px rgba(0,0,0,0.2);
        }

        .coin-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .coin-front {
            z-index: 2;
        }

        .coin-back {
            transform: rotateY(180deg);
        }

        /* Coin edge (thin strip visible during rotation) */
        .coin-edge {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #B8943E;
            box-shadow:
                inset 0 0 8px rgba(0,0,0,0.3),
                0 0 15px rgba(197,160,89,0.2);
            transform: translateZ(-2px);
            background: linear-gradient(135deg, #C5A059, #8B7340, #C5A059, #A08945);
        }

        @keyframes coin-spin {
            0% {
                transform: rotateY(0deg);
                filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
            }
            25% {
                filter: drop-shadow(4px 4px 12px rgba(0,0,0,0.3));
            }
            50% {
                transform: rotateY(180deg);
                filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
            }
            75% {
                filter: drop-shadow(-4px 4px 12px rgba(0,0,0,0.3));
            }
            100% {
                transform: rotateY(360deg);
                filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
            }
        }

        /* Metallic light sweep on the coin */
        .coin-shine {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(
                105deg,
                transparent 30%,
                rgba(255,255,255,0.15) 45%,
                rgba(255,255,255,0.25) 50%,
                rgba(255,255,255,0.15) 55%,
                transparent 70%
            );
            z-index: 3;
            pointer-events: none;
            animation: shine-sweep 3s ease-in-out infinite;
        }

        @keyframes shine-sweep {
            0%, 100% { opacity: 0; }
            20%, 30% { opacity: 1; }
            50% { opacity: 0; }
            70%, 80% { opacity: 1; }
        }

        /* ===== TITLE ===== */
        .loading-title {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 4rem;
            font-weight: 900;
            color: var(--an-gold);
            letter-spacing: 0.15em;
            text-align: center;
            line-height: 1;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 2;
            text-shadow:
                0 0 40px rgba(197,160,89,0.3),
                0 2px 4px rgba(0,0,0,0.5);
        }

        .loading-subtitle {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1rem;
            font-weight: 400;
            font-style: italic;
            color: var(--an-cream);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 2;
            opacity: 0.7;
        }

        /* ===== LOADING TEXT ===== */
        .loading-indicator {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .loading-dots {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1rem;
            color: var(--an-cream);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        /* Gold shimmer bar under the coin */
        .loading-bar {
            width: 160px;
            height: 2px;
            background: rgba(197,160,89,0.15);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -60%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--an-gold), transparent);
            animation: bar-shimmer 2s ease-in-out infinite;
        }

        @keyframes bar-shimmer {
            0% { left: -60%; }
            100% { left: 100%; }
        }

        /* ===== BOTTOM BADGE ===== */
        .loading-badge {
            position: absolute;
            bottom: 1.5rem;
            z-index: 3;
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 0.7rem;
            color: var(--an-gold);
            opacity: 0.3;
            letter-spacing: 0.5em;
            text-transform: uppercase;
        }

        /* ===== FLOATING PARTICLES (fireflies) ===== */
        .firefly {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--an-firefly);
            z-index: 1;
            opacity: 0;
            animation: firefly-float linear infinite;
        }

        .firefly:nth-child(1) { left: 10%; top: 80%; animation-duration: 8s; animation-delay: 0s; }
        .firefly:nth-child(2) { left: 25%; top: 70%; animation-duration: 10s; animation-delay: 1.5s; }
        .firefly:nth-child(3) { left: 50%; top: 85%; animation-duration: 7s; animation-delay: 0.5s; }
        .firefly:nth-child(4) { left: 75%; top: 75%; animation-duration: 9s; animation-delay: 2s; }
        .firefly:nth-child(5) { left: 90%; top: 80%; animation-duration: 11s; animation-delay: 3s; }
        .firefly:nth-child(6) { left: 35%; top: 90%; animation-duration: 8.5s; animation-delay: 4s; }

        @keyframes firefly-float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            30% { opacity: 0.2; }
            50% {
                transform: translateY(-40vh) translateX(20px);
                opacity: 0.7;
            }
            70% { opacity: 0.3; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(-80vh) translateX(-10px);
                opacity: 0;
            }
        }

        /* ===== BLAZOR ERROR ===== */
        #blazor-error-ui {
            display: none;
            background: var(--an-rafflesia, #8B0000);
            color: var(--an-cream, #F5F5DC);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            text-align: center;
            z-index: 9999;
            font-family: 'Cormorant Garamond', serif;
        }

        #blazor-error-ui .reload {
            color: var(--an-firefly, #FFD700);
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .coin-scene {
                width: 150px;
                height: 150px;
            }
            .loading-title {
                font-size: 3rem;
            }
            .loading-subtitle {
                font-size: 0.85rem;
                letter-spacing: 0.2em;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <!-- Firefly particles -->
            <div class="firefly"></div>
            <div class="firefly"></div>
            <div class="firefly"></div>
            <div class="firefly"></div>
            <div class="firefly"></div>
            <div class="firefly"></div>

            <!-- Title -->
            <h1 class="loading-title">Tjoean</h1>
            <p class="loading-subtitle">Game Edukasi Investasi</p>

            <!-- 3D Rotating Coin -->
            <div class="coin-scene">
                <div class="coin">
                    <div class="coin-face coin-front">
                        <img src="images/coin-front.jpg" alt="Orang Utan Capital" />
                        <div class="coin-shine"></div>
                    </div>
                    <div class="coin-face coin-back">
                        <img src="images/coin-back.jpg" alt="500" />
                        <div class="coin-shine"></div>
                    </div>
                    <div class="coin-edge"></div>
                </div>
            </div>

            <!-- Loading text -->
            <div class="loading-indicator">
                <div class="loading-bar"></div>
                <p class="loading-dots">Memuat</p>
            </div>

            <!-- Bottom badge -->
            <span class="loading-badge">Orang Utan Capital</span>
        </div>
    </div>

    <div id="blazor-error-ui">
        Terjadi kesalahan. <a href="" class="reload">Muat ulang</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
