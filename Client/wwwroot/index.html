<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tjoean - Game Edukasi Investasi</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="css/app.css" rel="stylesheet" />
    <style>
        /* ===== ART NOUVEAU LANDING PAGE ===== */
        :root {
            --an-forest: #1B4D3E;
            --an-forest-deep: #0F2E25;
            --an-brown: #8B4513;
            --an-gold: #C5A059;
            --an-cream: #F5F5DC;
            --an-copper: #B87333;
            --an-moss: #4A5D23;
            --an-auburn: #CD853F;
            --an-fig: #2F4F4F;
            --an-earth: #8B7355;
            --an-rafflesia: #8B0000;
            --an-firefly: #FFD700;
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1B4D3E 0%, #0F2E25 60%, #091A14 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            padding: 2rem;
            gap: 0;
        }

        /* Subtle paper texture overlay */
        .loading-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(245,245,220,0.008) 2px, rgba(245,245,220,0.008) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(245,245,220,0.008) 2px, rgba(245,245,220,0.008) 4px);
            pointer-events: none;
            z-index: 1;
        }

        /* Vignette effect */
        .loading-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(9,26,20,0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* ===== ART NOUVEAU FRAME ===== */
        .an-frame {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 3.5rem 2.5rem;
            max-width: 520px;
            width: 100%;
        }

        /* Ornate border via SVG */
        .an-border {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .an-border svg {
            width: 100%;
            height: 100%;
        }

        /* ===== DECORATIVE CORNER VINES ===== */
        .an-corner {
            position: absolute;
            width: 100px;
            height: 100px;
            z-index: 3;
            opacity: 0.7;
        }
        .an-corner--tl { top: -8px; left: -8px; }
        .an-corner--tr { top: -8px; right: -8px; transform: scaleX(-1); }
        .an-corner--bl { bottom: -8px; left: -8px; transform: scaleY(-1); }
        .an-corner--br { bottom: -8px; right: -8px; transform: scale(-1, -1); }

        /* ===== TITLE ===== */
        .an-title {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--an-gold);
            letter-spacing: 0.15em;
            text-align: center;
            line-height: 1;
            margin-bottom: 0.2rem;
            position: relative;
            z-index: 2;
            text-shadow:
                0 0 40px rgba(197,160,89,0.3),
                0 2px 4px rgba(0,0,0,0.5);
        }

        /* Decorative flourish under title */
        .an-flourish {
            width: 280px;
            height: 30px;
            margin: 0.5rem auto 1rem;
            position: relative;
            z-index: 2;
            opacity: 0.8;
        }

        /* ===== SUBTITLE ===== */
        .an-subtitle {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1.15rem;
            font-weight: 400;
            font-style: italic;
            color: var(--an-cream);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 1.8rem;
            position: relative;
            z-index: 2;
            opacity: 0.85;
        }

        /* ===== ORANGUTAN EMBLEM ===== */
        .an-emblem {
            width: 160px;
            height: 160px;
            margin: 0 auto 1.5rem;
            position: relative;
            z-index: 2;
            animation: emblem-breathe 4s ease-in-out infinite;
        }

        @keyframes emblem-breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(197,160,89,0.2)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 30px rgba(197,160,89,0.35)); }
        }

        /* ===== TAGLINE ===== */
        .an-tagline {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1rem;
            color: var(--an-auburn);
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
            letter-spacing: 0.1em;
            line-height: 1.6;
        }

        /* ===== LOADING INDICATOR ===== */
        .an-loader {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .an-loader-bar {
            width: 200px;
            height: 3px;
            background: rgba(197,160,89,0.15);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .an-loader-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--an-gold), transparent);
            animation: an-shimmer 2s ease-in-out infinite;
        }

        @keyframes an-shimmer {
            0% { left: -60%; }
            100% { left: 100%; }
        }

        .an-loader-text {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 0.85rem;
            color: var(--an-cream);
            opacity: 0.5;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            animation: an-pulse 2.5s ease-in-out infinite;
        }

        @keyframes an-pulse {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.7; }
        }

        /* ===== FLOATING BOTANICAL ELEMENTS ===== */
        .an-botanicals {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .an-leaf {
            position: absolute;
            opacity: 0.06;
        }

        .an-leaf--1 {
            top: 8%;
            left: 5%;
            width: 120px;
            animation: leaf-drift 12s ease-in-out infinite;
        }

        .an-leaf--2 {
            bottom: 12%;
            right: 4%;
            width: 100px;
            animation: leaf-drift 15s ease-in-out infinite reverse;
            transform: scaleX(-1);
        }

        .an-leaf--3 {
            top: 50%;
            left: -20px;
            width: 80px;
            animation: leaf-drift 10s ease-in-out infinite 2s;
        }

        .an-leaf--4 {
            top: 20%;
            right: -10px;
            width: 90px;
            animation: leaf-drift 13s ease-in-out infinite 1s;
            transform: scaleX(-1) rotate(30deg);
        }

        @keyframes leaf-drift {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(2deg); }
            75% { transform: translateY(5px) rotate(-1deg); }
        }

        /* ===== BOTTOM DENOMINATION BADGE ===== */
        .an-denomination {
            position: absolute;
            bottom: 1.5rem;
            z-index: 3;
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 0.7rem;
            color: var(--an-gold);
            opacity: 0.3;
            letter-spacing: 0.5em;
            text-transform: uppercase;
        }

        /* ===== BLAZOR ERROR ===== */
        #blazor-error-ui {
            display: none;
            background: var(--an-rafflesia, #8B0000);
            color: var(--an-cream, #F5F5DC);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            text-align: center;
            z-index: 9999;
            font-family: 'Cormorant Garamond', serif;
        }

        #blazor-error-ui .reload {
            color: var(--an-firefly, #FFD700);
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .an-frame {
                padding: 2rem 1.5rem 2rem;
            }
            .an-title {
                font-size: 3rem;
            }
            .an-subtitle {
                font-size: 0.9rem;
                letter-spacing: 0.2em;
            }
            .an-emblem {
                width: 120px;
                height: 120px;
            }
            .an-flourish {
                width: 200px;
            }
            .an-corner {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>

<body>
